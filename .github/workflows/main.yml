name: Build BlueForce APK Cloud Init
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Forced Project Initialization
        run: |
          rm -rf BlueForceNative
          # Usamos la versión más estable del CLI
          npx --yes react-native@latest init BlueForceNative --skip-install --npm
          
      - name: Inject Code
        run: |
          # Metemos tu archivo App.js
          cp App.js BlueForceNative/App.js
          cd BlueForceNative
          # Instalamos las librerías necesarias
          npm install react-native-bluetooth-classic@^1.60.1-rc1 --save
          
      - name: Build APK
        run: |
          cd BlueForceNative/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blueforce-apk
          path: BlueForceNative/android/app/build/outputs/apk/debug/app-debug.apk
