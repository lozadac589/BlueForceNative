name: Build BlueForce APK Standalone
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Initialize Project
        run: |
          rm -rf BlueForceNative
          npx @react-native-community/cli@latest init BlueForceNative --skip-install
          
      - name: Inject Code and Bundle
        run: |
          cp App.js BlueForceNative/App.js
          cd BlueForceNative
          npm install react-native-bluetooth-classic@latest --save
          # Este paso esencial "suelda" el código dentro de la App
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          
      - name: Build Standalone APK
        run: |
          cd BlueForceNative/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blueforce-apk
          path: BlueForceNative/android/app/build/outputs/apk/debug/app-debug.apk
